name = "roadtrip-blackroad"
main = "src/worker.js"
compatibility_date = "2024-09-01"
workers_dev = false

# RoadTrip — multi-agent fleet chat
routes = [
  { pattern = "roadtrip.blackroad.io/*", zone_name = "blackroad.io" },
]

[[d1_databases]]
binding = "DB"
database_name = "roadtrip"
database_id = "ec4efdfb-a76e-46fb-a821-1278e17e7b90"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "ROADTRIP_KV"
id = "1861124753e742709fbc393fffa6c9ba"

[triggers]
crons = ["*/5 * * * *", "0 * * * *"]

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[vars]
